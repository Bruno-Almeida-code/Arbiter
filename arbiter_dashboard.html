<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>ARBITER v1.0</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060810;--panel:#0a0e18;--border:#182030;
  --amber:#d49040;--ad:#7a6035;--ab:#f2c860;
  --red:#c04535;--teal:#2a8575;--blue:#1a3560;
  --grey:#3a4555;--gd:#12161e;--td:#5a5040;
  --glow:rgba(212,144,64,.12);--fg:var(--amber);
  --ft:'Space Grotesk',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
}
.L{--bg:#f2f0ea;--panel:#faf9f5;--border:#d0c8b5;--amber:#6a5515;--ad:#a09060;--ab:#4a3a0a;--red:#903525;--teal:#1a6555;--blue:#d0dde8;--grey:#b0a898;--gd:#e8e4dc;--td:#958870;--glow:rgba(106,85,21,.06);--fg:var(--amber)}
body{font-family:var(--fb);background:var(--bg);color:var(--fg);overflow:hidden;width:1920px;height:1080px;position:relative}
@media(max-width:1400px){body{width:100vw;height:100vh}}

/* EFFECTS */
.scan{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,144,64,.03),transparent);pointer-events:none;z-index:999}
.L .scan{display:none}
.vig{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.6) 100%);pointer-events:none;z-index:998}
.L .vig{background:none}

/* HEADER */
.hdr{height:40px;display:flex;align-items:center;gap:14px;padding:0 20px;border-bottom:1px solid var(--border);background:var(--panel);z-index:100;position:relative}
.hdr-title{font-family:var(--ft);font-size:14px;font-weight:600;letter-spacing:.25em;color:var(--ad)}
.hdr-sub{font-family:var(--fm);font-size:9px;letter-spacing:.15em;color:var(--td)}
.hdr-spacer{flex:1}
.toggle{display:flex;align-items:center;gap:2px;background:var(--gd);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.toggle button{background:none;border:none;color:var(--ad);font-family:var(--ft);font-size:11px;font-weight:500;padding:4px 12px;cursor:pointer;letter-spacing:.06em;transition:all .2s}
.toggle button.on{background:var(--amber);color:var(--bg)}
.err-box{font-family:var(--fm);font-size:11px;padding:3px 12px;border:1px solid var(--red);color:var(--red);letter-spacing:.08em}
.err-box.lo{border-color:var(--ad);color:var(--ad)}

/* SCRAMBLE OVERLAY */
.scramble-overlay{position:absolute;inset:0;z-index:500;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:11px;color:var(--ad);overflow:hidden;line-height:1.6;padding:40px;white-space:pre-wrap;word-break:break-all;opacity:1;transition:opacity .8s}
.scramble-overlay.done{opacity:0;pointer-events:none}

/* MAIN */
.main{display:flex;height:calc(1080px - 40px - 100px);overflow:hidden}
@media(max-width:1400px){.main{height:calc(100vh - 40px - 90px)}}

/* LEFT COL */
.lcol{width:380px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--panel)}
.prof-card{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0}
.photo-wrap{width:130px;height:168px;border:1px solid var(--border);margin:0 auto 10px;position:relative;cursor:pointer;overflow:hidden;background:linear-gradient(160deg,var(--panel),var(--bg))}
.photo-wrap:hover{border-color:var(--amber)}
.photo-wrap:hover::after{content:"▶ NEXT";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(6,8,16,.7);font-family:var(--ft);font-size:10px;color:var(--ab);letter-spacing:.15em}
.L .photo-wrap:hover::after{background:rgba(242,240,234,.7)}
.photo-sil{position:absolute;top:16%;left:20%;right:20%;bottom:20%;border-radius:50% 50% 45% 45%;background:var(--gd);opacity:.35}
.corner{position:absolute;width:8px;height:8px}
.c-tl{top:4px;left:4px;border-top:1px solid var(--ad);border-left:1px solid var(--ad)}
.c-tr{top:4px;right:4px;border-top:1px solid var(--ad);border-right:1px solid var(--ad)}
.c-bl{bottom:4px;left:4px;border-bottom:1px solid var(--ad);border-left:1px solid var(--ad)}
.c-br{bottom:4px;right:4px;border-bottom:1px solid var(--ad);border-right:1px solid var(--ad)}
.pname{text-align:center;font-family:var(--ft);font-size:15px;font-weight:600;color:var(--ab);line-height:1.3}
.pocc{text-align:center;font-family:var(--fm);font-size:9px;color:var(--ad);line-height:1.4;margin-top:3px}
.pfields{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.pf{font-size:11px;border-bottom:1px solid var(--gd);padding:2px 0}
.pf .pl{font-family:var(--fm);font-size:8px;color:var(--td);letter-spacing:.12em}
.pf .pv{color:var(--amber)}
.pf .pv.er{color:var(--red)}
.pflags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.pflags span{font-family:var(--fm);font-size:7px;padding:1px 5px;border:1px solid var(--ad);color:var(--ad)}
.pflags span.re{border-color:var(--red);color:var(--red)}
.pjudge{margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.pjudge .jl{font-family:var(--fm);font-size:7px;letter-spacing:.15em;color:var(--td)}
.pjudge .jv{font-family:var(--ft);font-size:13px;font-weight:600;line-height:1.3;margin-top:2px}
.pjudge .jd{font-family:var(--fb);font-size:10px;color:var(--ad);line-height:1.4;margin-top:3px}

/* LOG */
.log-col{flex:1;display:flex;flex-direction:column;overflow:hidden}
.log-hdr{padding:6px 14px;border-bottom:1px solid var(--border);font-family:var(--fm);font-size:9px;letter-spacing:.1em;color:var(--ad);flex-shrink:0}
.log-body{flex:1;overflow-y:auto;padding:2px 0}
.log-body::-webkit-scrollbar{width:3px}
.log-body::-webkit-scrollbar-thumb{background:var(--border)}
.le{padding:5px 14px 5px 18px;border-bottom:1px solid var(--gd);position:relative;font-size:11px;cursor:pointer;transition:opacity .15s,background .15s}
.le:hover{background:var(--glow)}
.le .lb{position:absolute;left:4px;top:5px;bottom:5px;width:2px;border-radius:1px}
.le .ly{font-family:var(--fm);color:var(--td);font-size:10px;min-width:38px;flex-shrink:0}
.le .la{font-family:var(--fm);color:var(--td);font-size:8px;min-width:28px;flex-shrink:0}
.le .lt{font-family:var(--fb);flex:1;line-height:1.5}
.le .lw{font-family:var(--fm);font-size:10px;flex-shrink:0}
.le.dim{opacity:.15}.le.fut{opacity:.28}
.rsec{padding:8px 14px;border-top:1px solid var(--amber);margin-top:4px;background:var(--glow)}
.rsec .rh{font-family:var(--fm);font-size:9px;letter-spacing:.1em;color:var(--ad);margin-bottom:4px}
.rsec .rl{font-family:var(--fm);font-size:10px;color:var(--ad);opacity:.5;line-height:1.7;padding:2px 0;border-bottom:1px solid var(--gd)}
.rsec .rl:last-child{border:none}

/* RADAR (right, massive) */
.rcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:10px}
.rtitle{font-family:var(--ft);font-size:11px;font-weight:500;letter-spacing:.2em;color:var(--ad);margin-bottom:6px}
.rwrap{width:600px;height:600px;position:relative}
@media(max-width:1400px){.rwrap{width:min(55vw,500px);height:min(55vw,500px)}}
.slbl{position:absolute;font-family:var(--fm);font-size:11px;transform:translate(-50%,-50%);pointer-events:none}
.rleg{display:flex;gap:20px;font-family:var(--fm);font-size:10px;color:var(--td);margin-top:8px}
.rleg .rd{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}

/* BOTTOM BAR */
.bbar{height:100px;flex-shrink:0;border-top:1px solid var(--border);background:var(--panel);display:flex;position:relative}
@media(max-width:1400px){.bbar{height:90px}}
.dotgrid{position:absolute;top:0;left:0;right:0;height:20px;overflow:hidden;opacity:.15}
.dotgrid span{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--ad)}
.pctrls{width:140px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding-top:20px}
.pbtn{width:40px;height:40px;border-radius:50%;border:2px solid var(--amber);background:none;color:var(--amber);font-size:16px;cursor:pointer;font-family:var(--ft);display:flex;align-items:center;justify-content:center;transition:all .2s}
.pbtn:hover{background:var(--glow)}
.pbtn.on{background:var(--amber);color:var(--bg)}
.srow{display:flex;gap:4px}
.sbtn{background:none;border:1px solid var(--border);color:var(--ad);font-family:var(--fm);font-size:9px;padding:2px 7px;cursor:pointer}
.sbtn.on{border-color:var(--amber);color:var(--amber)}
.tltrack{flex:1;position:relative;cursor:crosshair;padding:24px 16px 6px;user-select:none;touch-action:none}
.tlyr{position:absolute;top:22px;left:16px;right:16px;display:flex;justify-content:space-between;font-family:var(--fm);font-size:9px;color:var(--ad);opacity:.4}
.tlline{position:absolute;top:36px;left:16px;right:16px;height:2px;background:var(--gd)}
.tlpre{position:absolute;left:0;height:100%;opacity:.25}
.tlpost{position:absolute;right:0;height:100%;opacity:.25}
.tldot{position:absolute;top:33px;width:5px;height:5px;border-radius:50%;transform:translateX(-50%)}
.tlscrub{position:absolute;top:30px;width:2px;height:16px;transform:translateX(-50%);box-shadow:0 0 10px var(--ab)}
.tlslbl{position:absolute;top:50px;transform:translateX(-50%);font-family:var(--fm);font-size:10px;white-space:nowrap}
.tlinfo{position:absolute;bottom:4px;left:16px;right:16px;display:flex;justify-content:space-between;font-family:var(--fm);font-size:8px;color:var(--ad);opacity:.4}
.foot{height:16px;border-top:1px solid var(--gd);padding:0 20px;display:flex;align-items:center;justify-content:space-between;font-family:var(--fm);font-size:7px;color:var(--td);opacity:.2;letter-spacing:.12em}

/* EARTH OVERLAY */
.eov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(6,8,16,.9);z-index:10}
.L .eov{background:rgba(242,240,234,.92)}
.ebox{border:1px solid var(--ad);padding:24px 32px;text-align:center}
.ebox .ep{font-family:var(--ft);font-size:14px;color:var(--ad);margin-bottom:14px}
.ebox .ebtns{display:flex;gap:8px;justify-content:center}
.ebox .eb{background:none;border:1px solid var(--amber);color:var(--amber);font-family:var(--ft);font-size:11px;padding:5px 14px;cursor:pointer}
.ebox .blk{margin-top:14px;font-size:14px;color:var(--ab);animation:blk 1s step-end infinite}
@keyframes blk{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>

    '<div class="pname">'+p.nm+'</div><div class="pocc">'+tx(p.oc)+'</div>'+
    '<div class="pfields">'+
    '<div class="pf"><span class="pl">'+l.bi+'</span> <span class="pv">'+(p.b!=null?p.b:"—")+'</span></div>'+
    '<div class="pf"><span class="pl">'+l.di+'</span> <span class="pv">'+(p.d!=null?p.d:"—")+'</span></div>'+
    '<div class="pf"><span class="pl">'+l.ca+'</span> <span class="pv">'+tx(p.ca)+'</span></div>'+
    '<div class="pf"><span class="pl">'+l.er+'</span> <span class="pv">'+tx(p.er)+'</span></div>'+
    '<div class="pf" style="grid-column:span 2"><span class="pl">'+l.st+'</span> <span class="pv'+(stE?" er":"")+'">'+stV+'</span></div>'+
    '</div>'+
    '<div class="pflags">'+p.fl.map(function(f){return'<span'+(f.indexOf("ERR")>=0?' class="re"':'')+'>'+f+'</span>'}).join("")+'</div>'+
    '<div class="pjudge"><div class="jl">'+l.jg+'</div><div class="jv" style="color:'+(jcm[p.jc]||"var(--amber)")+'">'+tx(p.j)+'</div><div class="jd">'+tx(p.jt)+'</div></div>';

  document.getElementById("photow").addEventListener("click",function(){
    S.i=(S.i+1)%D.length;var np=pr();S.fAge=(np.d!=null&&np.b!=null)?np.d-np.b:0;S.play=false;
    document.getElementById("playbtn").textContent="▶";document.getElementById("playbtn").classList.remove("on");
    startDecode();render();
  });

  // LOG
  var body=document.getElementById("logbody");var h="";
  p.ev.forEach(function(ev,i){
    var isTab=ev.a!==null&&ev.a<7;var isHi=ev.y!==null&&p.b!==null&&ev.y<=(p.b||0)+S.age;
    var cls="le"+(isTab?" dim":"")+(!isTab&&!isHi?" fut":"");
    h+='<div class="'+cls+'" data-age="'+(ev.a!=null?ev.a:"")+'"><div class="lb" style="background:'+(cc[ev.c]||"transparent")+'"></div>'+
      '<div style="display:flex;gap:6px;align-items:baseline"><span class="ly">'+(ev.y!=null?ev.y:"—")+'</span><span class="la">'+(ev.a!=null?"["+ev.a+"]":"[—]")+'</span>'+
      '<span class="lt" style="color:'+(ev.c==="e"?"var(--red)":isTab?"var(--grey)":"var(--amber)")+'">'+tx(ev.t)+'</span>'+
      (ev.w!==0?'<span class="lw" style="color:'+(ev.w>0?"var(--teal)":"var(--red)")+'">'+(ev.w>0?"+":"")+ev.w+'</span>':"")+
      '</div></div>';
  });
  if(p.rd.length>0){
    h+='<div class="rsec"><div class="rh">── '+l.po+' ──</div>';
    p.rd.forEach(function(r){h+='<div class="rl">'+r+'</div>'});h+='</div>';
  }
  body.innerHTML=h;
  body.querySelectorAll(".le").forEach(function(el){el.addEventListener("click",function(){var a=this.getAttribute("data-age");if(a!==""){S.fAge=parseInt(a);S.play=false;document.getElementById("playbtn").textContent="▶";document.getElementById("playbtn").classList.remove("on");render()}})});

  // RADAR
  renderRadar(isG);

  // TIMELINE
  var tl=document.getElementById("tltrack");
  if(isF){tl.innerHTML='<div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--red);font-family:var(--fm);font-size:12px;letter-spacing:.1em">'+l.tna+'</div>';return}
  var th2="";var nL=Math.min(Math.ceil(span/10)+1,16);
  th2+='<div class="tlyr">';for(var i=0;i<nL;i++){var yr=(p.b||0)+i*10;if(yr>(p.d||0))break;th2+='<span>'+yr+'</span>'}th2+='</div>';
  th2+='<div class="tlline"><div class="tlpre" style="width:'+tabP+'%;background:var(--grey)"></div><div class="tlpost" style="left:'+tabP+'%;width:'+(100-tabP)+'%;background:var(--ad)"></div></div>';
  if(tabP<85)th2+='<div style="position:absolute;top:42px;left:'+(tabP/2)+'%;transform:translateX(-50%);font-family:var(--fm);font-size:7px;color:var(--grey);letter-spacing:.12em">'+l.pm+'</div>';
  p.ev.forEach(function(ev){if(ev.y===null)return;var pct=((ev.y-(p.b||0))/span)*100;th2+='<div class="tldot" style="left:calc(16px + '+(pct)+'% * (100% - 32px) / 100%);background:'+(cc[ev.c]||"var(--ad)")+'"></div>'});
  var scrP=(S.age/span)*100;
  th2+='<div class="tlscrub" style="left:calc(16px + '+scrP+'% * (100% - 32px) / 100%);background:var(--ab)"></div>';
  th2+='<div class="tlslbl" style="left:calc(16px + '+scrP+'% * (100% - 32px) / 100%);color:var(--ab)">'+((p.b||0)+S.age)+' · '+S.age+'a</div>';
  var ec=p.ev.filter(function(e){return e.y!==null&&e.y<=(p.b||0)+S.age}).length;
  th2+='<div class="tlinfo"><span>'+l.ev+': '+ec+'</span><span style="color:'+(p.cf!==null&&p.cf<50?'var(--red)':'var(--teal)')+'">'+l.cf+': '+(p.cf!==null?p.cf.toFixed(1)+'%':'ERR')+'</span></div>';
  tl.innerHTML=th2;
}

function renderRadar(gl){
  var p2=pr();var scores=interp(p2.sc,S.fAge);
  var sz=600,cx=sz/2,cy=sz/2,r=sz*.37,n=7,step=Math.PI*2/n,off=-Math.PI/2;
  function pt(i,v){var a=off+i*step;return[cx+Math.cos(a)*(v/100)*r,cy+Math.sin(a)*(v/100)*r]}
  var hasNull=scores.some(function(v){return v===null||isNaN(v)});
  var svg='<svg width="100%" viewBox="0 0 '+sz+' '+sz+'" style="overflow:visible"><defs><filter id="rg"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';
  [20,40,60,80,100].forEach(function(rv){var pts=[];for(var i=0;i<n;i++)pts.push(pt(i,rv).join(","));
    svg+='<polygon points="'+pts.join(" ")+'" fill="none" stroke="'+(rv===60?"var(--ad)":"var(--gd)")+'" stroke-width="'+(rv===60?'1':'.5')+'" '+(rv===60?'stroke-dasharray="5 3"':'')+' opacity="'+(rv===60?'.5':'.2')+'"/>'});
  for(var i=0;i<n;i++){var ep=pt(i,118);var lp=pt(i,100);
    svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+lp[0]+'" y2="'+lp[1]+'" stroke="var(--gd)" stroke-width=".4" opacity=".15"/>';
    svg+='<text x="'+ep[0]+'" y="'+ep[1]+'" text-anchor="middle" dominant-baseline="middle" fill="var(--ad)" font-size="10" font-family="\'Space Grotesk\',sans-serif" font-weight="500" style="letter-spacing:.08em">'+AX[i]+'</text>'}
  if(!hasNull){
    svg+='<polygon points="'+scores.map(function(v,i){return pt(i,v).join(",")}).join(" ")+'" fill="'+(gl?'rgba(192,69,53,.08)':'rgba(212,144,64,.05)')+'" stroke="'+(gl?'var(--red)':'var(--amber)')+'" stroke-width="2" style="filter:url(#rg);transition:all .3s ease-out"/>';
    scores.forEach(function(v,i){var pp=pt(i,v);svg+='<circle cx="'+pp[0]+'" cy="'+pp[1]+'" r="4" fill="'+(v>65?"var(--red)":v<35?"var(--teal)":"var(--amber)")+'" stroke="var(--bg)" stroke-width="1.5"/>'});
  }else{svg+='<text x="'+cx+'" y="'+cy+'" text-anchor="middle" fill="var(--red)" font-size="14" font-family="monospace" dominant-baseline="middle">ERR::NULL</text>'}
  svg+='</svg>';
  var wrap=document.getElementById("rwrap");wrap.innerHTML=svg;
  if(!hasNull)scores.forEach(function(v,i){var ang=off+i*step,d=r*1.35;var x=cx+Math.cos(ang)*d,y=cy+Math.sin(ang)*d;
    var lbl=document.createElement("div");lbl.className="slbl";lbl.style.cssText="left:"+(x/sz*100)+"%;top:"+(y/sz*100)+"%;color:"+(v>65?"var(--red)":v<35?"var(--teal)":"var(--ad)");lbl.textContent=v.toFixed(1);wrap.appendChild(lbl)});
  // Earth overlay
  var ex=document.querySelector(".eov");if(ex)ex.remove();
  if(p2.id==="EARTH_HUMANITY_41"){var ov=document.createElement("div");ov.className="eov";var l2=ll();
    ov.innerHTML='<div class="ebox"><div class="ep">'+l2.sv+'</div><div class="ebtns">'+(S.lang===0?'<button class="eb">[ GUARDAR ]</button><button class="eb">[ NÃO GUARDAR ]</button><button class="eb">[ CANCELAR ]</button>':'<button class="eb">[ SAVE ]</button><button class="eb">[ DON\'T SAVE ]</button><button class="eb">[ CANCEL ]</button>')+'</div><div class="blk">█</div></div>';
    document.getElementById("rcol").appendChild(ov)}
}

// TIMELINE INTERACTION
function handleTL(cx){
  var p2=pr();if(p2.id==="EARTH_HUMANITY_41")return;
  var el=document.getElementById("tltrack");var r=el.getBoundingClientRect();
  var pct=Math.max(0,Math.min(1,(cx-r.left-16)/(r.width-32)));
  var mx=(p2.d!=null&&p2.b!=null)?p2.d-p2.b:0;
  S.fAge=pct*mx;S.play=false;document.getElementById("playbtn").textContent="▶";document.getElementById("playbtn").classList.remove("on");
  render();
}
document.getElementById("tltrack").addEventListener("mousedown",function(e){handleTL(e.clientX)});
document.getElementById("tltrack").addEventListener("mousemove",function(e){if(e.buttons===1)handleTL(e.clientX)});
document.getElementById("tltrack").addEventListener("touchstart",function(e){e.preventDefault();handleTL(e.touches[0].clientX)},{passive:false});
document.getElementById("tltrack").addEventListener("touchmove",function(e){e.preventDefault();handleTL(e.touches[0].clientX)},{passive:false});

// TOGGLES
document.getElementById("tgl-lang").addEventListener("click",function(e){
  if(e.target.tagName!=="BUTTON")return;S.lang=parseInt(e.target.getAttribute("data-v"));
  this.querySelectorAll("button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-v")==String(S.lang))});render()});
document.getElementById("tgl-theme").addEventListener("click",function(e){
  if(e.target.tagName!=="BUTTON")return;var v=e.target.getAttribute("data-v");
  document.body.classList.toggle("L",v==="light");
  this.querySelectorAll("button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-v")===v)})});

// PLAY
document.getElementById("playbtn").addEventListener("click",function(){
  S.play=!S.play;this.textContent=S.play?"⏸":"▶";this.classList.toggle("on",S.play);
  if(S.play){var p2=pr();var mx=(p2.d!=null&&p2.b!=null)?p2.d-p2.b:0;if(S.fAge>=mx)S.fAge=0}
});
document.querySelectorAll(".sbtn").forEach(function(b){b.addEventListener("click",function(){
  S.spd=parseFloat(this.getAttribute("data-s"));
  document.querySelectorAll(".sbtn").forEach(function(x){x.classList.remove("on")});this.classList.add("on")})});

// Close dropdown
document.addEventListener("click",function(e){if(!e.target.closest(".sel-wrap")){var d=document.getElementById("dropdown");if(d)d.classList.remove("open")}});

// ANIMATION
var lastT=0;
function tick(ts){
  var dt=ts-lastT;lastT=ts;if(dt>100)dt=16;
  // Scanline
  S.scY=(S.scY+0.15)%100;document.getElementById("scan").style.top=S.scY+"%";
  // Smooth play
  if(S.play){
    var p2=pr();var mx=(p2.d!=null&&p2.b!=null)?p2.d-p2.b:0;
    S.fAge+=dt*0.003*S.spd; // smooth fractional increment
    if(S.fAge>=mx){S.fAge=mx;S.play=false;document.getElementById("playbtn").textContent="▶";document.getElementById("playbtn").classList.remove("on")}
    render();
  }
  requestAnimationFrame(tick);
}

// INIT
buildDots();
S.decoded=false;startDecode();
var ip=pr();S.fAge=(ip.d!=null&&ip.b!=null)?ip.d-ip.b:0;
render();
requestAnimationFrame(tick);
</script>
</body>
</html>
