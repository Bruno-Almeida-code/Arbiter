 mãe castigou-a.", "w": 5, "c": "v"}, {"y": 1916, "a": 16, "t": "Abandonou a escola por necessidade familiar. Não houve escolha.", "w": 0, "c": "n"}, {"y": 1920, "a": 20, "t": "Casamento arranjado. Aceitou sem protesto. Sem alternativa visível.", "w": 0, "c": "n"}, {"y": 1928, "a": 28, "t": "Primeiro filho nado-morto. Não falou sobre o assunto. Nunca.", "w": 0, "c": "n"}, {"y": 1936, "a": 36, "t": "Escondeu vizinho republicano durante buscas da PVDE. Risco pessoal elevado.", "w": 20, "c": "v"}, {"y": 1942, "a": 42, "t": "Denunciou anonimamente contrabandista que roubava rações à aldeia. Ele foi preso. Tinha filhos.", "w": -8, "c": "a"}, {"y": 1945, "a": 45, "t": "Recusou-se a denunciar colheita ilegal ao regime. Sem explicação.", "w": 10, "c": "v"}, {"y": 1960, "a": 60, "t": "Perdoou marido por infidelidade prolongada. Ou tolerou. O sistema não distingue.", "w": 5, "c": "a"}, {"y": 1975, "a": 75, "t": "25 de Abril. Chorou. Não soube explicar porquê.", "w": 0, "c": "n"}, {"y": 1982, "a": 82, "t": "Recusou ir ao hospital. \"Se Deus quiser, quero morrer em casa.\"", "w": 0, "c": "n"}, {"y": 1987, "a": 87, "t": "Óbito pacífico. A aldeia inteira compareceu ao funeral.", "w": 0, "c": "m"}], "rd": []}, {"id": "CAP-1945-8837", "nm": "Hans Wilhelm Brauer", "img": "images/personas/hans-brauer.jpg", "oc": "Carpinteiro · Soldado · Wehrmacht · Gefreiter", "b": 1910, "d": 1945, "ca": "Frente Leste. Óbito em combate. Última carta à mulher: \"Não sei se fiz bem.\"", "er": "Pré-contemporâneo", "st": "ERRO — CLASSIFICAÇÃO IMPOSSÍVEL", "e": 12847, "cf": 12.4, "j": "ERRO — CLASSIFICAÇÃO IMPOSSÍVEL", "jt": "O modelo não tem referência para este perfil. Os actos de virtude e pecado não se anulam — coexistem. O sistema tenta calcular uma média. Uma média de salvar famílias e executar um prisioneiro. O resultado é um número. O número não significa nada.", "jc": "#c75242", "fl": ["EDGE", "PRÉ-1918"], "sc": [{"a": 0, "v": [50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]}, {"a": 10, "v": [48.2, 43. nte Leste. Óbito em combate. Última carta à mulher: \"Não sei se fiz bem.\"", "w": 0, "c": "m"}], "rd": []}, {"id": "CAP-1944-4701", "nm": "Marguerite Étienne Delacroix", "img": "images/personas/marguerite-delacroix.jpg", "oc": "Professora primária · Résistance · Rede Lyon-Sud", "b": 1920, "d": 1944, "ca": "Executada. 14 de Março. O corpo não foi devolvido à família.", "er": "II Guerra", "st": "LOOP — CLASSIFICAÇÃO DUPLA", "e": 8934, "cf": 18.7, "j": "ERRO — CLASSIFICAÇÃO DUPLA", "jt": "O sistema atribui simultaneamente: HERÓI + PERPETRADOR. Ambas as classificações estão correctas. Ambas se excluem mutuamente. O modelo entra em loop. Default na incerteza: CÉU. Porque o Inferno reclamava.", "jc": "#c75242", "fl": ["EDGE"], "sc": [{"a": 0, "v": [50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]}, {"a": 10, "v": [50.0, 50.0, 49.1, 46.5, 48.8, 50.0, 50.0]}, {"a": 15, "v": [50.0, 50.0, 49.1, 45.6, 45.3, 48.8, 50.0]}, {"a": 18, "v": [44.4, 48.0, 49.1, 45.6, 45.3, 48.8, 48.6]}, {"a": 20, "v": [44.4, 48.0, 49.1, 45.6, 42.7, 38.3, 44.9]}, {"a": 21, "v": [48.1, 48.0, 49.1, 45.6, 42.7, 40.9, 55.4]}, {"a": 22, "v": [52.5, 61.1, 37.7, 39.5, 42.7, 40.9, 55.4]}, {"a": 23, "v": [52.5, 54.6, 11.7, 33.9, 56.7, 45.8, 55.4]}, {"a": 24, "v": [31.5, 47.2, 11.7, 33.9, 56.7, 45.8, 50.1]}], "ev": [{"y": 1920, "a": 0, "t": "Nascimento — Lyon, França. Filha de operários têxteis.", "w": 0, "c": "n"}, {"y": 1927, "a": 7, "t": "LIMIAR MORAL ATINGIDO · §7", "w": 0, "c": "m"}, {"y": 1930, "a": 10, "t": "Confrontou professor que humilhou colega. Expulsa durante 3 dias.", "w": 5, "c": "v"}, {"y": 1935, "a": 15, "t": "Activismo estudantil. Distribuição de panfletos anti-fascistas. Convicção precoce.", "w": 5, "c": "v"}, {"y": 1938, "a": 18, "t": "Diploma de professora primária. Leccionou em escola rural. Adorada pelos alunos.", "w": 8, "c": "v"}, {"y": 1940, "a": 20, "t": "Ocupação alemã. Adesão à Résistance. Voluntária. Sem hesitação.", "w": 15, "c": "v"}, {"y": 1941, "a": 21, "t": "Primeiro acto de sabotag   axisOrigins.forEach((o, axis)=>{
    pointSvg += `<circle cx="${o[0]}" cy="${o[1]}" r="2.1" fill="none" stroke="rgba(240,203,114,.34)" opacity=".85"/>`;
  });

  focus.forEach(({ev, idx, importance})=>{
    const axis=(idx*2+1)%n;
    const fixed=axisOrigins[axis];
    const hasScore = Math.abs(ev.w||0) > 0;
    const targetVal=Math.max(18,Math.min(96,baseline + ((scores[axis]??50)-baseline)*0.55 + (ev.w||0)*0.35));
    const target=pt(axis,targetVal);
    const col=catColor(ev.c);
    const rel = importance / maxImp;
    const alphaBase = hasScore ? 0.14 : 0.08;
    const alpha = Math.max(alphaBase, Math.min(0.96, alphaBase + rel*0.82));
    const lineAlpha = Math.max(0.05, alpha*0.52);
    const pointR = 1.8 + rel*1.8;

    if(hasScore){
      pointSvg += `<line x1="${fixed[0]}" y1="${fixed[1]}" x2="${target[0]}" y2="${target[1]}" stroke="${col}" stroke-width="${0.8 + rel*0.6}" opacity="${lineAlpha.toFixed(3)}"/><circle cx="${target[0]}" cy="${target[1]}" r="${pointR.toFixed(2)}" fill="${col}" fill-opacity="${alpha.toFixed(3)}" stroke="#05070b" stroke-width="${1.2 + rel*0.8}"/>`;
    }

    const anchorNode = hasScore ? target : fixed;
    const vx = anchorNode[0]-cx, vy = anchorNode[1]-cy;
    const len = Math.max(1, Math.hypot(vx,vy));
    const ux = vx/len, uy = vy/len;
    const side = ux>=0?1:-1;
    const outerPush = Math.max(hasScore ? 39 : 36, r*(hasScore ? 0.154 : 0.145));
    const anchorBaseX = hasScore ? (anchorNode[0] + ux*outerPush + side*5) : cx;
    const anchorBaseY = hasScore ? (anchorNode[1] + uy*outerPush + (idx%2?6:-6)) : 0;

    const sc = scatterOffset((idx+1)*31 + (ev.a||0)*7 + axis*13, (hasScore ? S.scatter : S.scatter*0.28) * 16);
    const isLimiar = (!hasScore && ev.c === 'm');
    const finalY = hasScore ? anchorBaseY : isLimiar ? (cy + r + 24) : (vy < 0 ? cy - r - 68 : cy + r + 22);
    labels.push({
      axis, ev, side: hasScore ? side : 0,
      attached: hasScore,
      node: anchorNode,
      x: hasScore ? anchorBaseX + sc.x : cx,
      y: finalY,
      col, alpha, rel,
      isLimiar,
      topZone: !hasScore && !isLimiar && vy < 0,
      sortKey: (idx+1)*31 + (ev.a||0)*7,
      lines: wrapText(ev.t, 28, 8)
    });
  });
  pointSvg += `</svg>`;
  document.getElementById('pointLayer').innerHTML=pointSvg;

  // Distribute neutral (non-attached) labels horizontally in top/bottom zones
  {
    const bwRef = Math.min(210, Math.max(152, w*0.14));
    const gap = 10;
    const spreadZone = zone => {
      if(!zone.length) return;
      const totalW = zone.length*(bwRef+gap)-gap;
      let startX = cx - totalW/2;
      zone.forEach(l=>{ l.x = startX + bwRef/2; startX += bwRef+gap; });
    };
    const topN = labels.filter(l=>!l.attached && !l.isLimiar && l.topZone).sort((a,b)=>a.sortKey-b.sortKey);
    const botN = labels.filter(l=>!l.attached && !l.isLimiar && !l.topZone).sort((a,b)=>a.sortKey-b.sortKey);
    spreadZone(topN);
    spreadZone(botN);
  }

  S.connectorData = [];
  let connIdx = 0;

  for(let axis=0; axis<7; axis++){
    let group = labels.filter(l=>l.axis===axis);
    const left = group.filter(l=>l.side<0).sort((a,b)=>a.y-b.y);
    const right = group.filter(l=>l.side>0).sort((a,b)=>a.y-b.y);
    const secure = 42;
    [left,right].forEach(sideGroup=>{
      for(let pass=0; pass<4; pass++){
        for(let i=1;i<sideGroup.length;i++){
          if(Math.abs(sideGroup[i].y-sideGroup[i-1].y) < secure) sideGroup[i].y = sideGroup[i-1].y + secure;
        }
      }
    });
    const neutral = group.filter(l=>l.side===0);
    group = [...left,...right,...neutral];

    const labelId = 'labelSin'+axis;
    const pointOff=S.layerOffsets.pointLayer||{x:0,y:0};
    const labelOff=S.layerOffsets[labelId]||{x:0,y:0};
    const dx=pointOff.x-labelOff.x, dy=pointOff.y-labelOff.y;

    let labelSvg=`<svg class="graphSvg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">`;
    group.forEach(l=>{
      const lineCount=l.lines.length, boxH=14 + lineCount*6, boxW=Math.min(210, Math.max(152, w*0.14));
      let x, y;
      if(l.side===0){
        x = l.x - boxW/2;
        y = Math.max(18, Math.min(h-boxH-18, l.y-boxH/2));
      } else {
        x = l.side>0?l.x:l.x-boxW;
        if(!l.attached){ x = l.side>0 ? Math.min(x, cx + r + 42) : Math.max(x, cx - r - boxW - 42); }
        y = Math.max(18, Math.min(h-boxH-18, l.y-boxH/2));
        if(l.side>0) x = Math.max(x, cx + r + (l.attached ? 7 : 4));
        else x = Math.min(x, cx - r - boxW - (l.attached ? 7 : 4));
      }

      const anchorX = l.side===0 ? (x+boxW/2) : (l.side>0?x:x+boxW);
      const anchorY = y+2;
      const nodeX=l.node[0]+dx, nodeY=l.node[1]+dy;
      const bendX = l.side===0 ? anchorX : (anchorX + (l.side>0?-8:8));
      const glassFill = 'rgba(9,12,20,0.42)';

      const labelKey=`${p.id}-${l.ev.a}-${l.ev.y}-${l.ev.t}`;
      labelSvg += `<g class="labelFade${S.seenLabels.has(labelKey)?'':' fadeNew'}">`;
      S.seenLabels.add(labelKey);
      if(l.attached){
        const connId = `conn-${connIdx++}`;
        S.connectorData.push({id:connId, nodeBaseX:l.node[0], nodeBaseY:l.node[1], labelId, bendX, anchorX, anchorY});
        labelSvg += `<polyline id="${connId}" points="${nodeX},${nodeY} ${bendX},${nodeY} ${anchorX},${anchorY}" fill="none" stroke="${l.col}" stroke-width="0.82" opacity=".9"/><circle id="${connId}-dot" cx="${nodeX}" cy="${nodeY}" r="1.5" fill="${l.col}" opacity=".9"/>`;
      }
      labelSvg += `<rect x="${x}" y="${y}" width="${boxW}" height="${boxH}" rx="3" fill="${glassFill}" stroke="rgba(255,255,255,.08)"/><text x="${x+6}" y="${y+9}" fill="${l.col}" font-size="5.1" font-family="'JetBrains Mono', monospace">${esc(l.ev.y ?? '—')}</text><text x="${x+6}" y="${y+15}" fill="#ece7dc" font-size="5.9" font-family="'Inter', sans-serif">${l.lines.map((ln,i)=>`<tspan x="${x+6}" dy="${i===0?0:6}">${esc(ln)}</tspan>`).join('')}</text></g>`;
    });
    labelSvg += `</svg>`;
    const layerEl = document.getElementById(labelId);
    if(layerEl) layerEl.innerHTML = labelSvg;
  }

  document.getElementById('centerLeftMeta').textContent=`TYPE::${String((focus[focus.length-1]?.c||'n')).toUpperCase()} / AGE::${Math.round(S.displayAge)} / PLAYHEAD::${Math.round(S.displayAge)}`;
  document.getElementById('centerRightMeta').textContent=`CNF::${p.cf ?? '—'} / ERR::${p.e}`;
  applyParallax();
}

function setTimelineScrub(p, age){
  const tl=document.getElementById('timeline');
  if(!tl) return;
  const span=Math.max(1,maxAge(p));
  const scrubPct=(age/span)*100;
  tl.style.setProperty('--scrub', `calc(42px + ${scrubPct}% * (100% - 84px) / 100)`);
  const range=tl.querySelector('#timelineRange');
  if(range) range.value = age;
  const lab=tl.querySelector('.scrubLabel');
  if(lab) lab.textContent = `${(p.b??0)+Math.round(age)} · ${Math.round(age)}a`;
  const info=tl.querySelector('.tInfo');
  if(info) info.innerHTML = `<span>EVENTS::${visibleEvents(p,age).length} / ${p.ev.length}</span><span>SPACE::PLAY / DRAG::SCRUB / MODE::${S.mode==='linear'?'LINEAR':'EVENT STEP ' + S.interval.toFixed(1)+'S'}</span>`;
}
function scrubTimelineClientX(p, clientX){
  const tl=document.getElementById('timeline');
  const area=tl.querySelector('.trackArea');
  const rect=area.getBoundingClientRect();
  const x=Math.max(0, Math.min(rect.width, clientX - rect.left));
  const age=(x / rect.width) * Math.max(1,maxAge(p));
  if(age < S.displayAge){ S.seenStack=new Set(); S.seenLabels=new Set(); }
  S.fAge = age;
  S.displayAge = age;
  if(S.mode==='event') syncEventCursorFromAge(p, age);
  stopPlayback();
  renderFeatured(); renderStack(); renderGraph(); setTimelineScrub(p, age);
}

function renderTimeline(){ const p=current(); const span=Math.max(1,maxAge(p)); const years=[]; const step=Math.max(5, Math.ceil(span/8/5)*5); for(let y=p.b; y<=p.d; y+=step) years.push(y); if(years[years.length-1]!==p.d) years.push(p.d); const tl=document.getElementById('timeline'); const width=(tl.clientWidth||1884)-84; let path=`M 0 28`; const samples=80; for(let i=0;i<=samples;i++){ const a=(i/samples)*span; const vals=interp(p.sc,a); const avg=vals.reduce((x,y)=>x+y,0)/vals.length; const impact=(avg-50)*0.95; const x=(i/samples)*width; const y=28-impact; path += ` L ${x.toFixed(2)} ${y.toFixed(2)}`; } const scrubPct=(S.displayAge/span)*100; tl.style.setProperty('--scrub', `calc(42px + ${scrubPct}% * (100% - 84px) / 100)`); tl.innerHTML=`<div class="years">${years.map(y=>`<span>${y}</span>`).join('')}</div><div class="trackArea"><svg class="trackSvg" viewBox="0 0 ${width} 56" preserveAspectRatio="none"><path class="trackBase" d="M 0 28 L ${width} 28"></path><path class="trackLine" d="${path}"></path></svg><div class="scrubLine"></div><div class="sliderWrap"><input id="timelineRange" class="timelineRange" type="range" min="0" max="${span}" step="0.01" value="${S.displayAge}"></div><div class="scrubLabel">${(p.b??0)+Math.round(S.displayAge)} · ${Math.round(S.displayAge)}a</div></div><div class="tInfo"><span>EVENTS::${visibleEvents(p,S.displayAge).length} / ${p.ev.length}</span><span>SPACE::PLAY / DRAG::SCRUB / MODE::${S.mode==='linear'?'LINEAR':'EVENT STEP ' + S.interval.toFixed(1)+'S'}</span></div>`; const trackArea=tl.querySelector('.trackArea'); p.ev.forEach(ev=>{ if(ev.a==null) return; const vals=interp(p.sc,ev.a); const avg=vals.reduce((x,y)=>x+y,0)/vals.length; const impact=(avg-50)*0.95; const dot=document.createElement('div'); dot.className='tEvent'; dot.style.setProperty('--ec', catColor(ev.c)); dot.style.left=`${(ev.a/span)*100}%`; dot.style.top=`${28-impact}px`; dot.onclick=()=>{ if(ev.a < S.displayAge){ S.seenStack=new Set(); S.seenLabels=new Set(); } S.fAge=ev.a; S.displayAge=ev.a; if(S.mode==='event'){ syncEventCursorFromAge(p, ev.a); } stopPlayback(); renderFeatured(); renderStack(); renderGraph(); renderTimeline(); }; trackArea.appendChild(dot); }); const range=tl.querySelector('#timelineRange');
  range.oninput=(e)=>{ const age=parseFloat(e.target.value); S.fAge=age; S.displayAge=age; if(S.mode==='event'){ syncEventCursorFromAge(p, age); } stopPlayback(); renderFeatured(); renderStack(); renderGraph(); setTimelineScrub(p, age); };
  const area=tl.querySelector('.trackArea');
  area.onpointerdown=(e)=>{ S.scrubbing=true; try{ area.setPointerCapture(e.pointerId); }catch(_e){} scrubTimelineClientX(p, e.clientX); };
  area.onpointermove=(e)=>{ if(S.scrubbing) scrubTimelineClientX(p, e.clientX); };
  const endScrub=()=>{ S.scrubbing=false; };
  area.onpointerup=endScrub; area.onpointercancel=endScrub;
}
function applyParallax(){ const mul=S.parallax, shiftX=S.px*54*mul, shiftY=S.py*42*mul, ageBias=(S.displayAge/(maxAge(current())||1))-0.5; const layers=[['gridFar',-shiftX*4.2-ageBias*70,-shiftY*3.0],['gridMid',-shiftX*3.0-ageBias*44,-shiftY*2.1],['crossLayer',-shiftX*2.0,-shiftY*1.3],['sin0',shiftX*.25,shiftY*.15],['labelSin0',shiftX*.42,shiftY*.24],['sin1',shiftX*.38,shiftY*.22],['labelSin1',shiftX*.58,shiftY*.33],['sin2',shiftX*.52,shiftY*.30],['labelSin2',shiftX*.76,shiftY*.45],['sin3',shiftX*.68,shiftY*.42],['labelSin3',shiftX*.96,shiftY*.60],['sin4',shiftX*.86,shiftY*.56],['labelSin4',shiftX*1.18,shiftY*.77],['sin5',shiftX*1.06,shiftY*.72],['labelSin5',shiftX*1.42,shiftY*.98],['sin6',shiftX*1.28,shiftY*.90],['labelSin6',shiftX*1.68,shiftY*1.18],['graphLayer',shiftX*1.90,shiftY*1.34],['pointLayer',shiftX*2.14,shiftY*1.52]]; S.layerOffsets={}; layers.forEach(([id,x,y])=>{ S.layerOffsets[id]={x,y}; const el=document.getElementById(id); if(el) el.style.transform=`translate(${x}px, ${y}px)`; }); (S.connectorData||[]).forEach(c=>{ const pOff=S.layerOffsets.pointLayer||{x:0,y:0}; const lOff=S.layerOffsets[c.labelId]||{x:0,y:0}; const ddx=pOff.x-lOff.x, ddy=pOff.y-lOff.y; const nx=c.nodeBaseX+ddx, ny=c.nodeBaseY+ddy; const el=document.getElementById(c.id); if(el) el.setAttribute('points',`${nx},${ny} ${c.bendX},${ny} ${c.anchorX},${c.anchorY}`); const dot=document.getElementById(c.id+'-dot'); if(dot){dot.setAttribute('cx',nx);dot.setAttribute('cy',ny);} }); }

function updateTimelineUI(){ renderTimeline(); }

function renderAll(){ renderFeatured(); renderStack(); renderGraph(); renderTimeline(); updatePlayButton(); }
function nextEventStep(p){
  const seq = eventSequence(p);
  const nextIdx = S.eventCursor + 1;
  return nextIdx < seq.length ? {idx:nextIdx, ev:seq[nextIdx]} : null;
}
function togglePlayback(){
  const p=current();
  const mx=maxAge(p);
  if(S.mode==='event'){
    const seq=eventSequence(p);
    const starting = !S.play;
    if(starting){
      if(S.eventCursor >= seq.length-1){ S.eventCursor=-1; S.fAge=0; S.displayAge=0; S.seenStack=new Set(); S.seenLabels=new Set(); }
      if(S.eventCursor < 0 && seq.length){
        S.eventCursor = 0;
        if(seq[0].a!=null){ S.fAge=seq[0].a; S.displayAge=seq[0].a; }
        renderFeatured(); renderStack(); renderGraph(); renderTimeline();
      }
    }
    S.play = !S.play;
    S.eventTimer = 0;
  } else {
    if(S.fAge>=mx-0.001){ S.fAge=0; S.displayAge=0; }
    S.play = !S.play;
    S.eventTimer = 0;
  }
  updatePlayButton();
}
function animate(ts){ if(!S.last) S.last=ts; const dt=Math.min(80, ts-S.last); S.last=ts; S.scanY=(S.scanY+dt*0.05)%1080; document.getElementById('scan').style.top=S.scanY+'px'; const p=current(); const mx=maxAge(p); let forceRender=false; if(S.play){ if(S.mode==='linear'){ S.fAge=Math.min(mx, S.fAge + dt*0.0032); if(S.fAge>=mx-0.001) stopPlayback(); } else { S.eventTimer += dt/1000; while(S.eventTimer>=S.interval){ S.eventTimer-=S.interval; const nxt=nextEventStep(p); if(!nxt){ S.fAge=mx; S.displayAge=mx; syncEventCursorFromAge(p, S.fAge); stopPlayback(); forceRender=true; break; } else { S.eventCursor=nxt.idx; if(nxt.ev.a!=null){ S.fAge=nxt.ev.a; S.displayAge=nxt.ev.a; } forceRender=true; } } } } let scrambleRender=false; if(!reachedTimelineEnd(p)){ S.scrambleTimer += dt; if(S.scrambleTimer >= 110){ S.scrambleTimer = 0; S.scramblePhase = (S.scramblePhase + 1) % 997; scrambleRender = true; } } if(S.mode==='linear'){ const delta=S.fAge-S.displayAge; if(Math.abs(delta)>0.001){ if(S.scrubbing){ S.displayAge=S.fAge; } else { S.displayAge += delta*Math.min(.24, dt/120); if(Math.abs(delta)<0.02) S.displayAge=S.fAge; } forceRender=true; } } if(forceRender){ renderFeatured(); renderStack(); renderGraph(); renderTimeline(); } else if(scrambleRender){ updateFeaturedDynamic(); } applyParallax(); requestAnimationFrame(animate); }
window.addEventListener('resize', ()=>{ scaleStage(); S.timelineCaseId=null; renderTimeline(); }); scaleStage();
document.getElementById('playBtn').onclick=()=>togglePlayback();
document.addEventListener('keydown', e=>{ if(e.code==='Space' && !/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)){ e.preventDefault(); togglePlayback(); } });
document.querySelectorAll('#modeSeg button').forEach(b=>b.onclick=()=>{ document.querySelectorAll('#modeSeg button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); S.mode=b.dataset.mode; S.seenStack=new Set(); S.seenLabels=new Set(); if(S.mode==='event'){ S.fAge=0; S.displayAge=0; S.eventCursor=-1; } else { syncEventCursorFromAge(current(), S.fAge); } updatePlayButton(); renderFeatured(); renderStack(); renderGraph(); renderTimeline(); });
document.querySelectorAll('#intervalSeg button').forEach(b=>b.onclick=()=>{ document.querySelectorAll('#intervalSeg button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); S.interval=parseFloat(b.dataset.int); updatePlayButton(); });
const pm=document.getElementById('playMenu'); document.getElementById('playMenuBtn').onclick=(e)=>{ e.stopPropagation(); pm.classList.toggle('open'); }; document.addEventListener('click', ()=>pm.classList.remove('open')); document.getElementById('playDrop').onclick=e=>e.stopPropagation();
document.getElementById('parallaxRange').oninput=e=>{ S.parallax=parseFloat(e.target.value); applyParallax(); }; const scatterEl=document.getElementById('scatterRange'); if(scatterEl){ scatterEl.oninput=e=>{ S.scatter=parseFloat(e.target.value); renderGraph(); }; } const stage=document.getElementById('stage'); stage.addEventListener('mousemove', e=>{ const r=stage.getBoundingClientRect(); S.px=((e.clientX-r.left)/r.width-.5); S.py=((e.clientY-r.top)/r.height-.5); }); stage.addEventListener('mouseleave', ()=>{ S.px=0; S.py=0; });
if(S.mode==='event'){ S.fAge=0; S.displayAge=0; S.eventCursor=-1; } else { S.fAge=maxAge(current()); S.displayAge=S.fAge; syncEventCursorFromAge(current(), S.fAge); } renderAll(); requestAnimationFrame(animate);
</script>
